version: "3.9"
services:
  postgres-operations:
    image: postgres:17.4-alpine3.21
    container_name: operations-db
    environment:
      POSTGRES_DB: operations_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"

  operations-service:
    image: operations-service:latest
    build: ./operations
    ports:
      - "8081:8081"
    depends_on:
      - postgres-operations
